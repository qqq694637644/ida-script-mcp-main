name: Host runner smoke

on:
  push:
    branches:
      - gpt/execute-subsystem-20260602-1dc47a
    paths:
      - ".github/workflows/host-runner-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: HostMachine smoke
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 10

    steps:
      - name: Print runner context
        shell: cmd
        run: |
          echo RUNNER_NAME=%RUNNER_NAME%
          echo RUNNER_OS=%RUNNER_OS%
          echo RUNNER_ARCH=%RUNNER_ARCH%
          echo RUNNER_TEMP=%RUNNER_TEMP%
          echo GITHUB_WORKSPACE=%GITHUB_WORKSPACE%
          whoami
          hostname
          if not "%RUNNER_NAME%"=="HostMachine" echo Warning: expected HostMachine, got %RUNNER_NAME%

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify checkout and host tools
        shell: cmd
        run: |
          git --version || exit /b 1
          git status --short || exit /b 1
          where python >nul 2>nul && python --version || echo python not found on host runner; runner dispatch/checkout smoke still passed.
          echo Host runner smoke completed.
