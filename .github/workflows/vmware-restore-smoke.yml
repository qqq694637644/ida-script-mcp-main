name: VMware restore smoke

on:
  push:
    branches:
      - gpt/execute-subsystem-20260602-1dc47a
    paths:
      - ".github/workflows/vmware-restore-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vmware-restore:
    name: Run host VMware restore script
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30

    steps:
      - name: Run host snapshot restore script
        shell: py -3 {0}
        run: |
          import os
          import socket
          import subprocess
          import sys
          from pathlib import Path

          def fail(message: str, code: int = 1) -> None:
              print(f"ERROR: {message}", file=sys.stderr)
              raise SystemExit(code)

          runner_name = os.environ.get("RUNNER_NAME", "")
          print(f"RUNNER_NAME={runner_name}")
          print(f"COMPUTERNAME={os.environ.get('COMPUTERNAME', '')}")
          print(f"USERNAME={os.environ.get('USERNAME', '')}")
          print(f"HOSTNAME={socket.gethostname()}")
          print(f"PYTHON={sys.executable}")
          print(f"PYTHON_VERSION={sys.version}")

          if runner_name != "HostMachine":
              fail(f"expected RUNNER_NAME=HostMachine, got {runner_name!r}")

          scripts_dir = Path(r"C:\Users\alion\Scripts")
          restore_script = scripts_dir / "vmware_restore_test1.py"
          if not scripts_dir.is_dir():
              fail(f"scripts directory does not exist: {scripts_dir}")
          if not restore_script.is_file():
              fail(f"restore script does not exist: {restore_script}")

          env = os.environ.copy()
          if env.pop("RUNNER_TRACKING_ID", None) is not None:
              print("Cleared RUNNER_TRACKING_ID so VMware child processes survive job cleanup.")
          os.environ.pop("RUNNER_TRACKING_ID", None)

          command = [sys.executable, str(restore_script), "--gui"]
          print("Running:", " ".join(command))
          result = subprocess.run(command, cwd=str(scripts_dir), env=env, check=False)
          raise SystemExit(result.returncode)
