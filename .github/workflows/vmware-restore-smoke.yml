name: VMware restore smoke

on:
  push:
    branches:
      - gpt/execute-subsystem-20260602-1dc47a
    paths:
      - ".github/workflows/vmware-restore-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vmware-restore:
    name: Run host VMware restore script
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30

    steps:
      - name: Run host snapshot restore script
        shell: cmd
        run: |
          echo RUNNER_NAME=%RUNNER_NAME%
          echo COMPUTERNAME=%COMPUTERNAME%
          whoami
          if not "%RUNNER_NAME%"=="HostMachine" exit /b 1
          cd /d C:\Users\alion\Scripts || exit /b 1
          if not exist vmware_restore_test1.py exit /b 1
          echo Clearing RUNNER_TRACKING_ID so VMware child processes survive job cleanup.
          set RUNNER_TRACKING_ID=
          echo PATH=%PATH%
          where python
          echo where_python_exit=%ERRORLEVEL%
          where py
          echo where_py_exit=%ERRORLEVEL%
          python --version
          echo python_version_exit=%ERRORLEVEL%
          py -3 --version
          echo py_version_exit=%ERRORLEVEL%
          where py >nul 2>nul
          if errorlevel 1 goto try_python
          py -3 vmware_restore_test1.py --gui
          exit /b %ERRORLEVEL%
          :try_python
          python --version >nul 2>nul
          if errorlevel 1 goto no_python
          python vmware_restore_test1.py --gui
          exit /b %ERRORLEVEL%
          :no_python
          echo Neither working py nor working python is available to the HostMachine service environment.
          exit /b 9009
